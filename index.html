<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Colour Analysis</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <img src="logo.png" class="logo">

    <h1>Advanced Personal Colour Analysis – $19.99</h1>

    <!-- Upload -->
    <div class="section">
        <label>Select Your Photo</label>
        <input type="file" id="imageUpload" accept="image/*">
    </div>

    <!-- Preview -->
    <div class="section hidden" id="previewSection">
        <h2>✨ Preview Result</h2>
        <div id="previewOutput"></div>
        <p><b>Continue below to unlock full report 👇</b></p>
    </div>

    <!-- Payment -->
    <div class="section hidden" id="paymentSection">
        <h2>Payment – $19.99</h2>

        <p>Pay using PayPal QR:</p>

        <img src="paypal-qr.png" class="qr" alt="PayPal QR">

        <p>Upload payment screenshot:</p>
        <input type="file" id="paymentProof" accept="image/*">

        <a href="https://forms.gle/ozaWvZJBFKpBxKgb6" target="_blank" class="form-btn">
            Fill Google Form
        </a>
    </div>

    <button id="analyzeBtn" disabled>Generate Full Report</button>

    <div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
